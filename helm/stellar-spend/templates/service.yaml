apiVersion: v1
kind: Service
metadata:
  name: {{ include "stellar-spend.fullname" . }}
  labels:
    {{- include "stellar-spend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "stellar-spend.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
