# Default values for stellar-spend Helm chart.
# Override per environment via values-staging.yaml / values-production.yaml

replicaCount: 2

image:
  repository: stellar-spend
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: stellar-spend.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

# Horizontal Pod Autoscaler
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Pod Disruption Budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Liveness probe
livenessProbe:
  httpGet:
    path: /api/health
    port: 3000
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3

# Readiness probe
readinessProbe:
  httpGet:
    path: /api/health
    port: 3000
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# Non-secret environment variables
env:
  NODE_ENV: production
  PORT: "3000"
  NEXT_PUBLIC_ENV: production

# Reference to an existing Secret containing app secrets.
# Keys expected: PAYCREST_API_KEY, PAYCREST_WEBHOOK_SECRET,
#                BASE_PRIVATE_KEY, DATABASE_URL
existingSecret: stellar-spend-secrets

serviceAccount:
  create: false
  name: ""

podAnnotations: {}

nodeSelector: {}

tolerations: []

affinity: {}
