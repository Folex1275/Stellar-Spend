# values-staging.yaml — override defaults for staging

replicaCount: 1

image:
  tag: staging

resources:
  requests:
    memory: "128Mi"
    cpu: "50m"
  limits:
    memory: "256Mi"
    cpu: "250m"

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3

podDisruptionBudget:
  enabled: false   # single replica in staging; PDB would block rolling updates

env:
  NODE_ENV: production
  PORT: "3000"
  NEXT_PUBLIC_ENV: staging

existingSecret: stellar-spend-secrets-staging
