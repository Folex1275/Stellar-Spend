name: Security Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: read
  security-events: write

jobs:
  # ── Dependency scanning ────────────────────────────────────────────────────
  dependency-scan:
    name: Dependency Scanning (npm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Generate SBOM
        run: npm sbom --sbom-format cyclonedx --sbom-output sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
          retention-days: 30

  # ── SAST scanning ──────────────────────────────────────────────────────────
  sast:
    name: SAST (ESLint Security)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Install security plugins
        run: npm install --save-dev eslint-plugin-security

      - name: Run security linting
        run: npx eslint . --ext .ts,.tsx --plugin security --rule 'security/detect-object-injection: warn'
        continue-on-error: true

  # ── Secret scanning ────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

  # ── License compliance ─────────────────────────────────────────────────────
  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Check licenses
        run: |
          npm install -g license-checker
          license-checker --onlyAllow "MIT,Apache-2.0,BSD,ISC,MPL-2.0" --excludePackages "stellar-spend"
        continue-on-error: true

  # ── Container scanning ─────────────────────────────────────────────────────
  container-scan:
    name: Container Image Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t stellar-spend:${{ github.sha }} .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: stellar-spend:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ── CodeQL analysis ───────────────────────────────────────────────────────
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v2

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2

  # ── Security report ───────────────────────────────────────────────────────
  security-report:
    name: Generate Security Report
    runs-on: ubuntu-latest
    needs: [dependency-scan, sast, secret-scan, license-check, container-scan, codeql]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Create security report
        run: |
          cat > SECURITY_REPORT.md << 'EOF'
          # Security Scan Report
          
          Generated: $(date)
          Commit: ${{ github.sha }}
          
          ## Scan Results
          
          - **Dependency Scan**: ${{ needs.dependency-scan.result }}
          - **SAST**: ${{ needs.sast.result }}
          - **Secret Scan**: ${{ needs.secret-scan.result }}
          - **License Check**: ${{ needs.license-check.result }}
          - **Container Scan**: ${{ needs.container-scan.result }}
          - **CodeQL**: ${{ needs.codeql.result }}
          
          ## Recommendations
          
          1. Review all HIGH and CRITICAL vulnerabilities
          2. Update dependencies with security patches
          3. Rotate any exposed secrets immediately
          4. Verify license compliance for new dependencies
          EOF

      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: SECURITY_REPORT.md
          retention-days: 90
