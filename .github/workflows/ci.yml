name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

# ── Stage 1: Lint ─────────────────────────────────────────────────────────────
jobs:
  lint:
    name: Lint (ESLint --max-warnings 0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Run ESLint (zero warnings)
        run: |
          npx -y -p eslint@9.39.4 \
            -p @typescript-eslint/parser@8.46.1 \
            -p @typescript-eslint/eslint-plugin@8.46.1 \
            -p eslint-plugin-react@7.37.5 \
            -p eslint-plugin-react-hooks@5.2.0 \
            -p @next/eslint-plugin-next@15.2.0 \
            eslint . --max-warnings 0

  # ── Stage 1: Type check ──────────────────────────────────────────────────────
  typecheck:
    name: Type Check (tsc --noEmit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Run tsc
        run: npx tsc --noEmit

  # ── Stage 2: Unit tests + coverage ──────────────────────────────────────────
  unit-tests:
    name: Unit Tests (Vitest + Coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Run unit tests with coverage
        run: npm run test:coverage -- --reporter=verbose
        env:
          CI: true

      - name: Enforce coverage thresholds
        # Fail if any threshold is not met (configured in vitest.config.ts)
        run: |
          node -e "
            const fs = require('fs');
            const summary = JSON.parse(fs.readFileSync('coverage/coverage-summary.json','utf8'));
            const t = summary.total;
            const thresholds = { lines: 70, functions: 70, branches: 60, statements: 70 };
            let failed = false;
            for (const [k,v] of Object.entries(thresholds)) {
              const pct = t[k].pct;
              if (pct < v) {
                console.error('Coverage threshold not met: ' + k + '=' + pct + '% < ' + v + '%');
                failed = true;
              } else {
                console.log('✅ ' + k + ': ' + pct + '% (threshold: ' + v + '%)');
              }
            }
            if (failed) process.exit(1);
          "

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage
          path: coverage/
          retention-days: 14

  # ── Stage 2: Integration tests ───────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: stellar
          POSTGRES_PASSWORD: stellar
          POSTGRES_DB: stellar_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Run database migrations
        run: npx ts-node scripts/migrate.ts
        env:
          DATABASE_URL: postgresql://stellar:stellar@localhost:5432/stellar_test

      - name: Run integration tests
        run: npm test -- --project=integration
        env:
          DATABASE_URL: postgresql://stellar:stellar@localhost:5432/stellar_test
          REDIS_URL: redis://localhost:6379
        continue-on-error: true

  # ── Stage 3: Build ────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-build-${{ github.sha }}
          path: .next/
          retention-days: 1

      - name: Collect bundle stats
        run: |
          du -sh .next/ > bundle-stats.txt
          find .next/static/chunks -name '*.js' -exec wc -c {} + | sort -n | tail -20 >> bundle-stats.txt
          cat bundle-stats.txt

      - name: Upload bundle stats
        uses: actions/upload-artifact@v4
        with:
          name: bundle-stats
          path: bundle-stats.txt
          retention-days: 14

  # ── Stage 4: E2E against built app ────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright vs built app)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: next-build-${{ github.sha }}
          path: .next/

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests against built app (next start)
        run: npm run test:e2e
        env:
          # Override webServer to use `next start` (built app) in CI
          CI: true
          PLAYWRIGHT_BASE_URL: http://localhost:3001

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 14

  # ── Stage 5: Docker build ─────────────────────────────────────────────────────
  docker-build:
    name: Docker Build & Verify
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: stellar-spend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify non-root runtime
        run: |
          UID=$(docker run --rm --entrypoint "" stellar-spend:${{ github.sha }} id -u)
          [ "$UID" -ne 0 ] || (echo "Container runs as root!" && exit 1)
          echo "✅ Runs as uid=$UID"

  # ── Deploy to staging ──────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy (Staging)
    runs-on: ubuntu-latest
    needs: [build, e2e, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: staging
      url: https://staging.stellar-spend.com
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.CONTAINER_REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ vars.CONTAINER_REGISTRY }}/stellar-spend:staging
            ${{ vars.CONTAINER_REGISTRY }}/stellar-spend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to staging
        run: echo "Deploying ${{ github.sha }} to staging"

  # ── Deploy to production ───────────────────────────────────────────────────────
  deploy-production:
    name: Deploy (Production)
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.event_name == 'release' && github.event.action == 'published'
    environment:
      name: production
      url: https://stellar-spend.com
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.CONTAINER_REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ vars.CONTAINER_REGISTRY }}/stellar-spend:latest
            ${{ vars.CONTAINER_REGISTRY }}/stellar-spend:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to production
        run: echo "Deploying ${{ github.ref_name }} to production"

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.14.0'

      - name: Lint chart (default values)
        run: helm lint helm/stellar-spend

      - name: Lint chart (staging values)
        run: helm lint helm/stellar-spend -f helm/stellar-spend/values-staging.yaml

      - name: Lint chart (production values)
        run: helm lint helm/stellar-spend -f helm/stellar-spend/values-production.yaml
