name: Contract Security Audit
on:
  push:
    branches: [main, develop]
    paths:
      - 'contracts/**'
      - '.github/workflows/contract-audit.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'contracts/**'
  schedule:
    # Weekly advisory database check
    - cron: '0 4 * * 1'
  workflow_dispatch: {}

jobs:
  static-analysis:
    name: Static Analysis & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts
      - name: Check formatting
        run: cd contracts && cargo fmt --check
      - name: Run Clippy (zero warnings)
        run: cd contracts && cargo clippy --all-targets -- -D warnings
      - name: Run tests
        run: cd contracts && cargo test

  advisory-scan:
    name: Dependency Advisory Scan (cargo-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Uses a prebuilt binary release instead of compiling cargo-audit from
      # source on every run — removes the slowest and flakiest step, and
      # posts results as a check/annotation instead of a flat pass/fail.
      - name: Run cargo-audit
        id: audit
        uses: rustsec/audit-check@v2
        continue-on-error: true
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Put RUSTSEC IDs you've reviewed and accepted here, e.g.:
          # ignore: RUSTSEC-2023-0001,RUSTSEC-2024-0002
          ignore: ''
          # Path to an optional audit.toml for more granular config
          # (denied warnings, informational advisories, etc.)
          file: contracts/Cargo.lock

      - name: Report audit outcome
        if: always()
        run: |
          if [ "${{ steps.audit.outcome }}" = "failure" ]; then
            echo "::warning::cargo-audit found one or more advisories. Review the audit-check annotations above and add reviewed/accepted IDs to the 'ignore' list in this workflow, or to contracts/audit.toml, once triaged."
          else
            echo "No outstanding advisories."
          fi

  build-wasm:
    name: Build Optimised WASM
    runs-on: ubuntu-latest
    needs: [static-analysis]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts
      - name: Build optimised WASM
        run: cd contracts && cargo build --target wasm32-unknown-unknown --release
      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-artifacts-${{ github.sha }}
          path: contracts/target/wasm32-unknown-unknown/release/*.wasm
          retention-days: 30
